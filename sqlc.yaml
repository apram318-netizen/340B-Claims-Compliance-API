version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/query"
    schema: "sql/schema"
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "pgx/v5"
        rename:
          manufacturer_dispute: Dispute
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
