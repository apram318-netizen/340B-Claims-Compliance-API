name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0

      - name: Vet
        run: go vet ./...

      - name: Unit and race tests
        run: go test ./... -race -count=1

      - name: Check migration numbering/order
        run: bash ./scripts/check-migrations.sh

      - name: Regenerate sqlc and ensure committed
        run: |
          sqlc generate
          git diff --exit-code

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: claims
          POSTGRES_PASSWORD: claims
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claims -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration test against live dependencies
        env:
          INTEGRATION_POSTGRES_ADMIN_URL: postgres://claims:claims@localhost:5432/postgres?sslmode=disable
          AMQP_URL: amqp://guest:guest@localhost:5672/
        run: go test -tags=integration ./integration/... -count=1 -v
